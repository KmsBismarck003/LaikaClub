services:
  # Base de Datos MySQL
  laika_db:
    image: mysql:8.0
    container_name: laika_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laika_club3_v2}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - laika_db_data:/var/lib/mysql
      # Importa automáticamente el respaldo configurado en init.sql al iniciar por primera vez en un equipo limpio
      - ./backups/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # API Gateway
  gateway:
    build: .
    container_name: laika_gateway
    ports:
      - "8000:8000"
    command: uvicorn microservices.gateway:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONPATH=/app
      - AUTH_SERVICE_URL=http://auth:8001
      - EVENTS_SERVICE_URL=http://events:8002
      - TICKETS_SERVICE_URL=http://tickets:8003
      - STATS_SERVICE_URL=http://stats:8004
      - ADMIN_SERVICE_URL=http://admin:8005
      - ACHIEVEMENTS_SERVICE_URL=http://achievements:8006
      - ANALYTICS_SERVICE_URL=http://analytics:8007
      - MERCHANDISE_SERVICE_URL=http://merchandise:8008
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      - auth
      - events
      - tickets
      - stats
      - admin
      - achievements
      - analytics
      - merchandise
    env_file:
      - .env.docker
    volumes:
      - ./uploads:/app/uploads
      - ./microservices_logs:/app/microservices_logs

  auth:
    build: .
    container_name: laika_auth
    ports:
      - "8001:8001"
    command: uvicorn microservices.auth.main:app --host 0.0.0.0 --port 8001
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./microservices_logs:/app/microservices_logs

  events:
    build: .
    container_name: laika_events
    ports:
      - "8002:8002"
    command: uvicorn microservices.events.main:app --host 0.0.0.0 --port 8002
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./uploads:/app/uploads
      - ./microservices_logs:/app/microservices_logs

  tickets:
    build: .
    container_name: laika_tickets
    ports:
      - "8003:8003"
    command: uvicorn microservices.tickets.main:app --host 0.0.0.0 --port 8003
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./microservices_logs:/app/microservices_logs

  stats:
    build: .
    container_name: laika_stats
    ports:
      - "8004:8004"
    command: uvicorn microservices.stats.main:app --host 0.0.0.0 --port 8004
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./microservices_logs:/app/microservices_logs

  admin:
    build: .
    container_name: laika_admin
    ports:
      - "8005:8005"
    command: uvicorn microservices.admin.main:app --host 0.0.0.0 --port 8005
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./microservices_logs:/app/microservices_logs

  achievements:
    build: .
    container_name: laika_achievements
    ports:
      - "8006:8006"
    command: uvicorn microservices.achievements.main:app --host 0.0.0.0 --port 8006
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./microservices_logs:/app/microservices_logs

  analytics:
    build: .
    container_name: laika_analytics
    ports:
      - "8007:8007"
    command: uvicorn microservices.analytics_bigdata.main:app --host 0.0.0.0 --port 8007
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./microservices_logs:/app/microservices_logs

  merchandise:
    build: .
    container_name: laika_merchandise
    ports:
      - "8008:8008"
    command: uvicorn microservices.merchandise.main:app --host 0.0.0.0 --port 8008
    environment:
      - PYTHONPATH=/app
      - MYSQL_HOST=laika_db
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=laika_club3_v2
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./uploads:/app/uploads
      - ./microservices_logs:/app/microservices_logs

  # React Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: laika_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./uploads:/app/public/uploads # Permite al frontend acceder a imágenes cargadas por el admin
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - gateway
    stdin_open: true
    tty: true

networks:
  default:
    name: laika_network

volumes:
  laika_db_data:
