
services:
  # Base de Datos MySQL
  laika_db:
    image: mysql:8.0
    container_name: laika_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laika_club}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # API Gateway
  gateway:
    build: .
    container_name: laika_gateway
    ports:
      - "8000:8000"
    command: uvicorn microservices.gateway:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONPATH=/app
    depends_on:
      - auth
      - events
      - tickets
      - stats
      - admin
      - achievements
      - analytics
      - merchandise
    env_file:
      - .env.docker

  auth:
    build: .
    container_name: laika_auth
    ports:
      - "8001:8001"
    command: uvicorn microservices.auth.main:app --host 0.0.0.0 --port 8001
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  events:
    build: .
    container_name: laika_events
    ports:
      - "8002:8002"
    command: uvicorn microservices.events.main:app --host 0.0.0.0 --port 8002
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  tickets:
    build: .
    container_name: laika_tickets
    ports:
      - "8003:8003"
    command: uvicorn microservices.tickets.main:app --host 0.0.0.0 --port 8003
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  stats:
    build: .
    container_name: laika_stats
    ports:
      - "8004:8004"
    command: uvicorn microservices.stats.main:app --host 0.0.0.0 --port 8004
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  admin:
    build: .
    container_name: laika_admin
    ports:
      - "8005:8005"
    command: uvicorn microservices.admin.main:app --host 0.0.0.0 --port 8005
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  achievements:
    build: .
    container_name: laika_achievements
    ports:
      - "8006:8006"
    command: uvicorn microservices.achievements.main:app --host 0.0.0.0 --port 8006
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  analytics:
    build: .
    container_name: laika_analytics
    ports:
      - "8007:8007"
    command: uvicorn microservices.analytics_bigdata.main:app --host 0.0.0.0 --port 8007
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

  merchandise:
    build: .
    container_name: laika_merchandise
    ports:
      - "8008:8008"
    command: uvicorn microservices.merchandise.main:app --host 0.0.0.0 --port 8008
    environment:
      - PYTHONPATH=/app
    depends_on:
      laika_db:
        condition: service_healthy
    env_file:
      - .env.docker

networks:
  default:
    name: laika_network
