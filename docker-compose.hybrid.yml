    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker

  achievements:
    build: .
    container_name: laika_achievements_hybrid
    ports:
      - "8006:8006"
    command: uvicorn microservices.achievements.main:app --host 0.0.0.0 --port 8006
