version: '3.8'

services:
  # API Gateway
  gateway:
    build: .
    container_name: laika_gateway_hybrid
    ports:
      - "8000:8000"
    command: uvicorn microservices.gateway:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker

  auth:
    build: .
    container_name: laika_auth_hybrid
    ports:
      - "8001:8001"
    command: uvicorn microservices.auth.main:app --host 0.0.0.0 --port 8001
    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker

  events:
