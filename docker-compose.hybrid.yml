    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker

  merchandise:
    build: .
    container_name: laika_merchandise_hybrid
    ports:
      - "8008:8008"
    command: uvicorn microservices.merchandise.main:app --host 0.0.0.0 --port 8008
    environment:
      - PYTHONPATH=/app
