    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker

  stats:
    build: .
    container_name: laika_stats_hybrid
    ports:
      - "8004:8004"
