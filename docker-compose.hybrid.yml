    environment:
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker

  admin:
    build: .
    container_name: laika_admin_hybrid
    ports:
      - "8005:8005"
