server:
  port: 8008

spring:
  application:
    name: laika-merchandise
  
  # Base database configs for fallback
  datasource:
    mysql:
      url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:laika_club3_v2}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
    sqlite:
      url: jdbc:sqlite:microservices/merchandise/merchandise.db
      driver-class-name: org.xerial.sqlite.JDBC
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false

# JWT settings mapping to env
jwt:
  secret: ${JWT_SECRET:super_secret_laika_club_2026}
  expiration: 604800000 # 7 days in milliseconds

# External microservice URLs
services:
  events:
    url: ${EVENTS_SERVICE_URL:http://localhost:8002}

# MongoDB Sync properties
mongo:
  uri: ${MONGO_URI:}
  db: ${MONGO_DB:laika_analytics}
