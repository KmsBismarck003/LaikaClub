server:
  port: 8006

spring:
  application:
    name: laika-achievements
  
  # Base database configs for fallback
  datasource:
    mysql:
      url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:laika_club3_v2}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
    sqlite:
      url: jdbc:sqlite:microservices/achievements/achievements.db
      driver-class-name: org.xerial.sqlite.JDBC
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false

# JWT settings mapping to env
jwt:
  secret: ${JWT_SECRET:super_secret_laika_club_2026}
  expiration: 604800000 # 7 days in milliseconds

# Service URLs
services:
  tickets-url: ${TICKETS_SERVICE_URL:http://localhost:8003}
  auth-url: ${AUTH_SERVICE_URL:http://localhost:8001}
