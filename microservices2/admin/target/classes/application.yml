server:
  port: 8005

spring:
  application:
    name: laika-admin
  
  # Base database configs for fallback
  datasource:
    mysql:
      url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:laika_club3_v2}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
    sqlite:
      url: jdbc:sqlite:microservices/events/events.db
      driver-class-name: org.xerial.sqlite.JDBC
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# JWT settings mapping to env
jwt:
  secret: ${JWT_SECRET:super_secret_laika_club_2026}
  expiration: 604800000 # 7 days in milliseconds

# Upload path properties
uploads:
  path: uploads
  ads-dir: uploads/ads

# MongoDB properties for backup
mongo:
  uri: ${MONGO_URI:mongodb://localhost:27017}
  db: ${MONGO_DB:laika_analytics}
